<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jochgeier Wetter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #10151c;
    --panel: #1a222d;
    --panel2: #212c3a;
    --text: #e8eef5;
    --muted: #8fa1b5;
    --accent: #4da3ff;
    --ok: #3fbf6f;
    --warn: #f0b429;
    --danger: #e5484d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }
  header {
    padding: max(env(safe-area-inset-top), 8px) 14px 8px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 17px; font-weight: 700; }
  header .sub { font-size: 12px; color: var(--muted); }
  #advice {
    margin: 0 10px 8px;
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    background: var(--panel);
    border-left: 4px solid var(--muted);
  }
  #advice.ok { border-color: var(--ok); }
  #advice.warn { border-color: var(--warn); }
  #advice.danger { border-color: var(--danger); }
  #advice .detail { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }
  #map { flex: 1; min-height: 240px; }
  .leaflet-container { background: #0c1117; }
  /* free RainViewer tiles are coarse (native z7) — soften the upscaled pixel blocks.
     Blur the tile imgs, not the pane: a whole-pane filter makes one huge GPU layer
     that can miss repaints while many images decode. */
  .leaflet-radar-pane img.leaflet-tile { filter: blur(5px); }
  /* soften the thresholded cloud mask's coarse pixel edges */
  .leaflet-overlay-pane img.leaflet-image-layer { filter: blur(3px); }

  /* animation control bar */
  #anim {
    background: var(--panel);
    padding: 8px 12px calc(8px);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #playBtn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #timeline { flex: 1; accent-color: var(--accent); }
  #frameLabel {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    min-width: 92px;
    text-align: right;
  }
  #frameLabel .tag { display: block; font-size: 10px; color: var(--warn); }
  #frameLabel .tag.past { color: var(--muted); }

  #layerRow {
    background: var(--panel);
    display: flex;
    gap: 8px;
    padding: 0 12px 10px;
    font-size: 12px;
    align-items: center;
  }
  .toggle {
    display: flex; align-items: center; gap: 5px;
    background: var(--panel2);
    border-radius: 8px;
    padding: 5px 9px;
    cursor: pointer;
    user-select: none;
  }
  .toggle input { accent-color: var(--accent); }
  button.toggle { border: none; color: var(--text); font-size: 12px; font-family: inherit; }
  button.toggle.armed { background: var(--danger); font-weight: 700; }
  #status { color: var(--muted); margin-left: auto; font-size: 11px; }

  /* full-screen storm alarm */
  body.alarm-flash::before {
    content: "⛈ GEWITTER IM ANZUG – ABSTEIGEN!";
    position: fixed; inset: 0; z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    background: rgba(170, 25, 35, .88);
    color: #fff; font-size: clamp(24px, 7vw, 64px); font-weight: 800;
    text-align: center; padding: 20px;
    animation: alarmpulse 0.8s infinite alternate;
  }
  @keyframes alarmpulse { from { opacity: 1; } to { opacity: .55; } }

  /* forecast strip */
  #forecast {
    background: var(--bg);
    padding: 10px 10px max(env(safe-area-inset-bottom), 10px);
  }
  #forecast h2 { font-size: 12px; color: var(--muted); font-weight: 600; margin: 0 4px 6px; text-transform: uppercase; letter-spacing: .5px; }
  #hours {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .hour {
    background: var(--panel);
    border-radius: 10px;
    padding: 8px 10px;
    min-width: 86px;
    flex-shrink: 0;
    text-align: center;
  }
  .hour.now { outline: 1.5px solid var(--accent); }
  .hour .t { font-size: 12px; color: var(--muted); }
  .hour .icon { font-size: 22px; line-height: 1.3; }
  .hour .temp { font-size: 14px; font-weight: 700; }
  .hour .clouds { display: flex; gap: 2px; justify-content: center; margin: 5px 0 3px; }
  .hour .clouds div {
    width: 16px; height: 22px;
    border-radius: 3px;
    background: var(--panel2);
    position: relative;
    overflow: hidden;
  }
  .hour .clouds div::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: var(--h);
    background: #7fa8cc;
  }
  .hour .clouds .lo::after { background: #9fb9d0; }
  .hour .clouds .mi::after { background: #7fa0c4; }
  .hour .clouds .hi::after { background: #5f83ab; }
  .hour .rain { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .hour .rain b { color: var(--accent); }
  .hour .cape { font-size: 10px; margin-top: 3px; color: var(--warn); font-weight: 700; }
  .hour .wind { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .legendRow { display: flex; gap: 12px; font-size: 10px; color: var(--muted); margin: 6px 4px 0; }
  .legendRow span::before { content: "■ "; }
  .legendRow .l1::before { color: #9fb9d0; }
  .legendRow .l2::before { color: #7fa0c4; }
  .legendRow .l3::before { color: #5f83ab; }
</style>
</head>
<body>

<header>
  <h1>⛰️ Jochgeier</h1>
  <span class="sub">1.895 m · Gem. Sarntal · 46,6331 N 11,3228 O</span>
</header>

<div id="advice"><span id="adviceText">Lade Wetterdaten …</span><span class="detail" id="adviceDetail"></span></div>

<div id="map"></div>

<div id="anim">
  <button id="playBtn" title="Abspielen / Pause">▶</button>
  <input type="range" id="timeline" min="0" max="0" value="0" step="1">
  <div id="frameLabel">–:–</div>
</div>
<div id="layerRow">
  <label class="toggle"><input type="checkbox" id="satToggle" checked> ☁️ Wolken (Satellit)</label>
  <label class="toggle"><input type="checkbox" id="radarToggle" checked> 🌧 Regenradar</label>
  <button id="alarmBtn" class="toggle" title="Warnt mit Sirene und Meldung, wenn eine Gewitterzelle heranzieht. Funktioniert, solange die App geöffnet ist.">🔕 Alarm aus</button>
  <span id="status"></span>
</div>

<div id="forecast">
  <h2>Punktprognose Jochgeier – nächste Stunden</h2>
  <div id="hours"></div>
  <div class="legendRow">
    <span class="l1">tiefe Wolken (Nebel!)</span>
    <span class="l2">mittlere</span>
    <span class="l3">hohe</span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const LAT = 46.633135, LON = 11.322837, ELEV = 1895;

/* ---------- map ---------- */
// fadeAnimation off: Leaflet's rAF-driven tile fade freezes in throttled/background
// tabs and leaves tiles stuck half-transparent (dark boxes)
const map = L.map('map', { zoomControl: true, attributionControl: true, fadeAnimation: false })
  .setView([LAT, LON], 11);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 15,
  attribution: 'Karte: © Esri | Wolken: EUMETSAT | Radar: RainViewer'
}).addTo(map);

// stacking: satellite image (overlayPane, 400) < radar (450) < marker/rings (markerPane, 600)
map.createPane('radar').style.zIndex = 450;

// Jochgeier marker + reference rings (5 / 15 km)
L.circleMarker([LAT, LON], { pane: 'markerPane', radius: 7, color: '#e5484d', weight: 3, fillColor: '#fff', fillOpacity: 1 })
  .addTo(map).bindPopup('<b>Jochgeier</b><br>Hütte, 1.895 m');
L.circle([LAT, LON], { pane: 'markerPane', radius: 5000, color: '#e5484d', weight: 1, dashArray: '4 6', fill: false, opacity: .6 }).addTo(map);
L.circle([LAT, LON], { pane: 'markerPane', radius: 15000, color: '#e5484d', weight: 1, dashArray: '2 8', fill: false, opacity: .35 }).addTo(map);

/* ---------- Cloud + rain animation ----------
   Clouds:  EUMETSAT Meteosat (MTG) GeoColour via EUMETView WMS, 10-min imagery
   Rain:    RainViewer radar (observed + nowcast)                              */
const WMS_URL = 'https://view.eumetsat.int/geoserver/wms';
const SAT_LAYER = 'mtg_fd:rgb_geocolour';
const HISTORY_MIN = 60;    // observed cloud movement: last hour is enough
const FORECAST_MIN = 30;   // extend the loop at least this far past "now"
const STEP_MIN = 10;
// satellite images are fetched PAD beyond the viewport on each side, so the
// extrapolated (shifted) cloud mask still has real data at its edges
const PAD = 0.75;
const BLANK_PX = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==';

const state = {
  frames: [],          // [{time(unix), satIso|null, fcMin|null, radarPath|null, isNowcast}]
  layers: {},          // cache: key -> L.tileLayer / L.imageOverlay
  satData: {},         // iso -> Promise<canvas|null> (processed cloud mask)
  satBounds: null,     // bounds all sat/forecast overlays share for the current view
  satEnd: 0,           // ms of newest satellite image
  baseIso: null,       // iso of newest satellite image (extrapolation base)
  motion: undefined,   // cached Promise<{vx,vy}|null>, full-res px per minute
  idx: 0,
  playing: false,
  timer: null,
  host: ''
};

const $ = id => document.getElementById(id);

function fmtTime(unix) {
  return new Date(unix * 1000).toLocaleTimeString('de-IT', { hour: '2-digit', minute: '2-digit' });
}

// swapping a data-URL src on an already-mounted, blur-filtered img can leave a
// stale GPU texture (the new image never paints); re-adding the layer forces a
// fresh rasterize. setOpacity state survives via options.opacity.
function remount(ov) {
  if (ov._map) { const m = ov._map; m.removeLayer(ov); ov.addTo(m); }
}

function makeSatLayer(iso) {
  // ONE seamless GetMap image over the (padded) current view instead of 256px tiles:
  // no tile seams, and requesting near the satellite's native ~1 km resolution lets
  // the browser upscale smoothly instead of showing hard pixel blocks.
  const b = state.satBounds = state.satBounds || map.getBounds().pad(PAD);
  const sw = L.CRS.EPSG3857.project(b.getSouthWest());
  const ne = L.CRS.EPSG3857.project(b.getNorthEast());
  const wM = ne.x - sw.x, hM = ne.y - sw.y;
  const w = Math.max(160, Math.min(1400, Math.round(wM / 500)));
  const h = Math.max(120, Math.round(w * hM / wM));
  const url = WMS_URL + '?service=WMS&version=1.3.0&request=GetMap' +
    '&layers=' + encodeURIComponent(SAT_LAYER) + '&styles=' +
    '&format=image%2Fpng&transparent=false&crs=EPSG%3A3857' +
    `&bbox=${sw.x},${sw.y},${ne.x},${ne.y}&width=${w}&height=${h}` +
    '&time=' + encodeURIComponent(iso);
  // start with a transparent pixel; swap in the processed cloud mask when ready
  const ov = L.imageOverlay(BLANK_PX, b, { opacity: 0 });
  state.satData[iso] = new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try { const cv = extractClouds(img); ov.setUrl(cv.toDataURL('image/png')); remount(ov); resolve(cv); }
      catch (e) { ov.setUrl(url); remount(ov); resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
  return ov;
}

// GeoColour photo -> cloud mask: clouds are bright AND unsaturated (white/gray),
// terrain is colored (green/brown) -> becomes transparent so the map shows through.
// Cloud thickness maps to opacity, so structure and movement stay readable.
function extractClouds(img) {
  const cv = document.createElement('canvas');
  cv.width = img.naturalWidth; cv.height = img.naturalHeight;
  const cx = cv.getContext('2d');
  cx.drawImage(img, 0, 0);
  const d = cx.getImageData(0, 0, cv.width, cv.height);
  const p = d.data;
  // normalize per image: scenes dim toward dusk, so anchor thresholds to the
  // 95th-percentile brightness instead of absolute values
  const mins = [];
  for (let i = 0; i < p.length; i += 16) {
    mins.push(Math.min(p[i], p[i + 1], p[i + 2]));
  }
  mins.sort((x, y) => x - y);
  const p95 = mins[Math.floor(mins.length * 0.95)] / 255;
  const scale = 0.72 / Math.max(0.3, p95);
  for (let i = 0; i < p.length; i += 4) {
    const r = p[i], g = p[i + 1], b = p[i + 2];
    const mn = Math.min(r, g, b), mx = Math.max(r, g, b);
    const wht = (mn / 255) * scale;
    const sat = mx ? (mx - mn) / mx : 0;
    // earlier onset + steeper ramp + gamma lift: thin clouds stay clearly visible
    const a = Math.max(0, Math.min(1, (wht - 0.24) / 0.22)) *
              Math.max(0, Math.min(1, 1 - sat * 0.8));
    // dark slate "cloud shadow" — white would vanish on the light base map
    p[i] = 45; p[i + 1] = 58; p[i + 2] = 80;
    p[i + 3] = Math.round(Math.pow(a, 0.8) * 240);
  }
  cx.putImageData(d, 0, 0);
  return cv;
}
function makeRadarLayer(path) {
  return L.tileLayer(`${state.host}${path}/256/{z}/{x}/{y}/4/1_1.png`,
    { pane: 'radar', tileSize: 256, opacity: 0, maxNativeZoom: 7 });
}

/* ---------- cloud motion nowcast ----------
   The satellite feed runs ~30 min behind real time, so the loop used to end in
   the past. Fix: measure how the cloud mask shifted between the oldest and
   newest satellite frames (brute-force block matching on the downscaled alpha
   channel) and push the newest mask forward along that vector for the future
   frames. Cheap, and good enough for "will that cloud bank reach the hut". */
function getMotion() {
  if (state.motion !== undefined) return state.motion;
  state.motion = (async () => {
    const sats = state.frames.filter(f => f.satIso);
    if (sats.length < 2) return null;
    const fB = sats.at(-1);
    const fA = sats[Math.max(0, sats.length - 4)];   // ~30 min apart
    const [a, b] = await Promise.all([state.satData[fA.satIso], state.satData[fB.satIso]]);
    if (!a || !b || a.width !== b.width || a.height !== b.height) return null;
    const G = 96, gh = Math.max(28, Math.round(G * a.height / a.width));
    const grid = cv => {
      const c = document.createElement('canvas');
      c.width = G; c.height = gh;
      const g2 = c.getContext('2d');
      g2.drawImage(cv, 0, 0, G, gh);
      const dd = g2.getImageData(0, 0, G, gh).data;
      const out = new Float32Array(G * gh);
      for (let i = 0; i < out.length; i++) out[i] = dd[i * 4 + 3];
      return out;
    };
    const A = grid(a), B = grid(b);
    let sum = 0; for (const v of B) sum += v;
    if (sum / B.length < 4) return null;             // (almost) cloud-free: nothing to track
    const R = Math.min(12, Math.floor((Math.min(G, gh) - 6) / 2));
    let best = null, err0 = 0;
    for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) {
      let err = 0, n = 0;
      for (let y = R; y < gh - R; y += 2) for (let x = R; x < G - R; x += 2) {
        err += Math.abs(A[y * G + x] - B[(y + dy) * G + (x + dx)]); n++;
      }
      err /= n;
      if (!dx && !dy) err0 = err;
      if (!best || err < best.err) best = { dx, dy, err };
    }
    // reject unreliable matches: barely better than "no movement", or the
    // winner sits on the search boundary (runaway match on changed clouds)
    if (best.err > err0 * 0.85 || Math.abs(best.dx) === R || Math.abs(best.dy) === R) return null;
    const dtMin = (fB.time - fA.time) / 60;
    const s = a.width / G / dtMin;
    let vx = best.dx * s, vy = best.dy * s;          // full-res px per minute
    // physical sanity cap: clouds rarely drift faster than ~90 km/h
    const bp = state.satBounds;
    if (bp) {
      const swp = L.CRS.EPSG3857.project(bp.getSouthWest()), nep = L.CRS.EPSG3857.project(bp.getNorthEast());
      const kmMin = Math.hypot(vx, vy) * ((nep.x - swp.x) / a.width) / 1000;
      if (kmMin > 1.5) { const f = 1.5 / kmMin; vx *= f; vy *= f; }
    }
    return { vx, vy };
  })();
  return state.motion;
}

function makeForecastLayer(minAhead) {
  const ov = L.imageOverlay(BLANK_PX, state.satBounds || map.getBounds().pad(PAD), { opacity: 0 });
  (async () => {
    const base = state.baseIso && await state.satData[state.baseIso];
    if (!base) return;
    const mot = await getMotion();
    // clamp the shift to the off-viewport margin, so the mask's transparent
    // edge can never slide into view and read as a fake cloud front
    const margin = PAD / (1 + 2 * PAD);
    let dx = (mot?.vx || 0) * minAhead, dy = (mot?.vy || 0) * minAhead;
    const k = Math.min(1,
      (base.width * margin - 2) / Math.max(1, Math.abs(dx)),
      (base.height * margin - 2) / Math.max(1, Math.abs(dy)));
    const c = document.createElement('canvas');
    c.width = base.width; c.height = base.height;
    const cx = c.getContext('2d');
    cx.globalAlpha = Math.max(0.8, 1 - minAhead / 300);   // gentle fade with lead time; the "Prognose" tag carries the uncertainty
    cx.drawImage(base, Math.round(dx * k), Math.round(dy * k));
    ov.setUrl(c.toDataURL('image/png'));
    remount(ov);
  })();
  return ov;
}

function preloadLayers() {
  state.frames.forEach(f => {
    if (f.satIso) getLayer('sat' + f.satIso, () => makeSatLayer(f.satIso));
    if (f.fcMin != null) getLayer('fsat' + f.time, () => makeForecastLayer(f.fcMin));
    if (f.radarPath) getLayer('radar' + f.radarPath, () => makeRadarLayer(f.radarPath));
  });
}

// satellite images are view-dependent: rebuild them after pan/zoom
let satRebuildTimer;
map.on('moveend', () => {
  clearTimeout(satRebuildTimer);
  satRebuildTimer = setTimeout(() => {
    Object.keys(state.layers).forEach(k => {
      if (k.startsWith('sat') || k.startsWith('fsat')) { map.removeLayer(state.layers[k]); delete state.layers[k]; }
    });
    state.satData = {}; state.motion = undefined; state.satBounds = null;
    if (state.frames.length) {
      preloadLayers();
      showFrame(state.idx);
    }
  }, 400);
});

function getLayer(key, factory) {
  if (!state.layers[key]) {
    state.layers[key] = factory();
    state.layers[key].addTo(map);
  }
  return state.layers[key];
}

function showFrame(i) {
  const satOn = $('satToggle').checked;
  const radarOn = $('radarToggle').checked;
  state.idx = i;
  const f = state.frames[i];
  if (!f) return;
  const wantSat = !satOn ? null
    : f.satIso ? 'sat' + f.satIso
    : f.fcMin != null ? 'fsat' + f.time : null;
  const wantRadar = radarOn && f.radarPath ? 'radar' + f.radarPath : null;
  if (wantSat) getLayer(wantSat, () => f.satIso ? makeSatLayer(f.satIso) : makeForecastLayer(f.fcMin));
  if (wantRadar) getLayer(wantRadar, () => makeRadarLayer(f.radarPath));
  Object.entries(state.layers).forEach(([key, lyr]) => {
    lyr.setOpacity(key === wantSat ? 0.9 : key === wantRadar ? 0.8 : 0);
  });
  $('timeline').value = i;
  $('frameLabel').innerHTML = fmtTime(f.time) +
    (f.time * 1000 > state.satEnd ? '<span class="tag">Prognose</span>' : '<span class="tag past">beobachtet</span>');
}

function play() {
  state.playing = true;
  $('playBtn').textContent = '⏸';
  state.timer = setInterval(() => {
    let next = state.idx + 1;
    if (next >= state.frames.length) next = 0;
    showFrame(next);
  }, 700);
}
function pause() {
  state.playing = false;
  $('playBtn').textContent = '▶';
  clearInterval(state.timer);
}
$('playBtn').onclick = () => state.playing ? pause() : play();
$('timeline').oninput = e => { pause(); showFrame(+e.target.value); };
$('satToggle').onchange = () => showFrame(state.idx);
$('radarToggle').onchange = () => showFrame(state.idx);

async function latestSatTime() {
  // small per-layer capabilities doc contains the time dimension end
  const res = await fetch(`https://view.eumetsat.int/geoserver/${SAT_LAYER.replace(':', '/')}/wms?service=WMS&version=1.3.0&request=GetCapabilities`);
  const xml = await res.text();
  const m = xml.match(/<Dimension name="time"[^>]*>.*?\/([0-9T:.\-]+Z)\/PT/s);
  if (m) return new Date(m[1]).getTime();
  // fallback: assume 25 min latency, rounded down to 10 min
  const t = Date.now() - 25 * 60e3;
  return Math.floor(t / (STEP_MIN * 60e3)) * STEP_MIN * 60e3;
}

async function loadFrames() {
  const wasPlaying = state.playing;
  try {
    const [satEnd, rv] = await Promise.all([
      latestSatTime(),
      fetch('https://api.rainviewer.com/public/weather-maps.json').then(r => r.json()).catch(() => null)
    ]);
    state.host = rv?.host || 'https://tilecache.rainviewer.com';
    state.satEnd = satEnd;
    const radar = [...(rv?.radar?.past || []), ...(rv?.radar?.nowcast || [])];
    const nowcastPaths = new Set((rv?.radar?.nowcast || []).map(r => r.path));
    const nearestRadar = tUnix => {
      let best = null, bd = Infinity;
      for (const r of radar) { const d = Math.abs(r.time - tUnix); if (d < bd) { bd = d; best = r; } }
      return bd <= 6 * 60 ? best : null;
    };

    // observed satellite frames (the sat feed runs ~30 min behind real time)
    const frames = [];
    for (let ms = satEnd - HISTORY_MIN * 60e3; ms <= satEnd; ms += STEP_MIN * 60e3) {
      const unix = Math.round(ms / 1000);
      frames.push({
        time: unix,
        satIso: new Date(ms).toISOString().replace(/\.\d+Z$/, '.000Z'),
        radarPath: nearestRadar(unix)?.path || null,
        isNowcast: false
      });
    }
    state.baseIso = frames.at(-1).satIso;
    // future frames past the newest satellite image: extrapolated clouds +
    // radar (observed until ~now, RainViewer nowcast beyond)
    const endMs = Math.max(Date.now() + FORECAST_MIN * 60e3,
      ...(rv?.radar?.nowcast || []).map(r => r.time * 1000));
    for (let ms = satEnd + STEP_MIN * 60e3; ms <= endMs; ms += STEP_MIN * 60e3) {
      const unix = Math.round(ms / 1000);
      const r = nearestRadar(unix);
      frames.push({
        time: unix,
        satIso: null,
        fcMin: Math.round((ms - satEnd) / 60e3),
        radarPath: r?.path || null,
        isNowcast: r ? nowcastPaths.has(r.path) : false
      });
    }

    // drop layers/masks that no longer belong to any frame
    const wanted = new Set();
    frames.forEach(f => {
      if (f.satIso) wanted.add('sat' + f.satIso);
      if (f.fcMin != null) wanted.add('fsat' + f.time);
      if (f.radarPath) wanted.add('radar' + f.radarPath);
    });
    Object.keys(state.layers).forEach(key => {
      if (!wanted.has(key)) { map.removeLayer(state.layers[key]); delete state.layers[key]; }
    });
    Object.keys(state.satData).forEach(iso => { if (!wanted.has('sat' + iso)) delete state.satData[iso]; });
    state.motion = undefined;

    state.frames = frames;
    $('timeline').max = frames.length - 1;
    preloadLayers();
    // open positioned at "now", not on the half-hour-old satellite frame
    const nowU = Date.now() / 1000;
    let nowIdx = 0;
    frames.forEach((f, i) => { if (Math.abs(f.time - nowU) < Math.abs(frames[nowIdx].time - nowU)) nowIdx = i; });
    showFrame(nowIdx);
    $('status').textContent = 'Beobachtet bis ' + fmtTime(satEnd / 1000) +
      ' · Prognose bis ' + fmtTime(frames.at(-1).time);
    if (wasPlaying || !state.timer) play();
    updateAdvice();   // storm scan on fresh radar frames
  } catch (e) {
    $('status').textContent = 'Satellit/Radar nicht erreichbar';
  }
}
loadFrames();
setInterval(loadFrames, 5 * 60 * 1000); // refresh frames every 5 min

/* ---------- Open-Meteo point forecast ---------- */
function windArrow(degFrom) {
  // arrow points where wind goes
  const arrows = ['↓','↙','←','↖','↑','↗','→','↘'];
  return arrows[Math.round(((degFrom + 180) % 360) / 45) % 8];
}
function skyIcon(low, mid, high, precip, cape) {
  if (precip >= 0.5 && cape > 800) return '⛈';
  if (precip >= 0.1) return '🌧';
  const tot = Math.max(low, mid, high);
  if (low >= 70) return '🌫';
  if (tot >= 80) return '☁️';
  if (tot >= 40) return '⛅';
  return '☀️';
}

/* ---------- storm approach detection (radar pixel analysis around the hut) ---------- */
const RZ = 7, TPX = 256;                       // RainViewer free tier: max zoom 7
const N_TILES = TPX * Math.pow(2, RZ);
const HUTPX = {
  x: (LON + 180) / 360 * N_TILES,
  y: (1 - Math.asinh(Math.tan(LAT * Math.PI / 180)) / Math.PI) / 2 * N_TILES
};
const M_PER_PX = 40075016.686 * Math.cos(LAT * Math.PI / 180) / N_TILES; // ≈ 840 m
const SCAN_KM = 60;

async function radarEchoNear(path) {
  const rPx = Math.ceil(SCAN_KM * 1000 / M_PER_PX);
  const x0 = Math.floor((HUTPX.x - rPx) / TPX), x1 = Math.floor((HUTPX.x + rPx) / TPX);
  const y0 = Math.floor((HUTPX.y - rPx) / TPX), y1 = Math.floor((HUTPX.y + rPx) / TPX);
  const cv = document.createElement('canvas');
  cv.width = (x1 - x0 + 1) * TPX; cv.height = (y1 - y0 + 1) * TPX;
  const cx = cv.getContext('2d', { willReadFrequently: true });
  await Promise.all(Array.from((function* () {
    for (let tx = x0; tx <= x1; tx++) for (let ty = y0; ty <= y1; ty++) yield [tx, ty];
  })()).map(([tx, ty]) => new Promise(res => {
    const im = new Image();
    im.crossOrigin = 'anonymous';
    im.onload = () => { cx.drawImage(im, (tx - x0) * TPX, (ty - y0) * TPX); res(); };
    im.onerror = res;
    im.src = `${state.host}${path}/256/${RZ}/${tx}/${ty}/4/1_1.png`;
  })));
  const ox = HUTPX.x - x0 * TPX, oy = HUTPX.y - y0 * TPX;
  const d = cx.getImageData(0, 0, cv.width, cv.height).data;
  let dist = null, strong = null, bearing = null;
  for (let py = 0; py < cv.height; py++) {
    for (let px = 0; px < cv.width; px++) {
      const i = (py * cv.width + px) * 4;
      if (d[i + 3] < 90) continue;                    // no echo
      const dx = px - ox, dy = py - oy;
      const km = Math.hypot(dx, dy) * M_PER_PX / 1000;
      if (km > SCAN_KM) continue;
      if (dist === null || km < dist) { dist = km; bearing = (Math.atan2(dx, -dy) * 180 / Math.PI + 360) % 360; }
      if (d[i] > 140 && (strong === null || km < strong)) strong = km; // yellow/orange/red core
    }
  }
  return { dist, strong, bearing };
}

// distance trend over the last ~30 min of observed radar -> approach speed & ETA
async function analyzeStorm() {
  const frames = state.frames.filter(f => f.radarPath && !f.isNowcast).slice(-4);
  if (frames.length < 2) return null;
  const res = [];
  for (const f of frames) res.push({ t: f.time, ...(await radarEchoNear(f.radarPath)) });
  const val = r => r.strong ?? r.dist;
  const newest = res.at(-1);
  if (val(newest) == null) return { none: true };
  const oldest = res.find(r => val(r) != null);
  let speed = null; // km/min, positive = approaching
  if (oldest && oldest !== newest && (newest.t - oldest.t) >= 9 * 60) {
    speed = (val(oldest) - val(newest)) / ((newest.t - oldest.t) / 60);
  }
  return {
    dist: val(newest),
    strongNow: newest.strong != null,
    bearing: newest.bearing,
    speed,
    eta: speed > 0.08 ? Math.round(val(newest) / speed) : null
  };
}

/* ---------- alarm ---------- */
let alarmArmed = localStorage.getItem('alarmArmed') === '1';
let lastAlarmAt = 0;
let audioCtx;
function tone(freqPlan, dur, vol) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const g = audioCtx.createGain(); g.connect(audioCtx.destination); g.gain.value = vol;
    const o = audioCtx.createOscillator(); o.type = 'square'; o.connect(g);
    const t0 = audioCtx.currentTime;
    freqPlan.forEach(([at, f]) => o.frequency.setValueAtTime(f, t0 + at));
    o.start(t0); o.stop(t0 + dur);
  } catch (e) {}
}
function siren() {
  tone([[0, 900], [0.4, 600], [0.8, 900], [1.2, 600], [1.6, 900], [2.0, 600], [2.4, 900]], 3, 0.5);
  setTimeout(() => tone([[0, 900], [0.4, 600], [0.8, 900], [1.2, 600]], 1.6, 0.5), 4000);
}
function fireAlarm(text) {
  if (Date.now() - lastAlarmAt < 15 * 60e3) return;   // max every 15 min
  lastAlarmAt = Date.now();
  siren();
  if (navigator.vibrate) navigator.vibrate([600, 200, 600, 200, 900]);
  document.body.classList.add('alarm-flash');
  try {
    if ('Notification' in window && Notification.permission === 'granted')
      new Notification('⛈ Jochgeier: Abstieg empfohlen!', { body: text });
  } catch (e) {}
}
document.body.addEventListener('click', () => document.body.classList.remove('alarm-flash'));
function updateAlarmBtn() {
  const b = $('alarmBtn');
  b.textContent = alarmArmed ? '🔔 Alarm EIN' : '🔕 Alarm aus';
  b.classList.toggle('armed', alarmArmed);
}
$('alarmBtn').onclick = async () => {
  alarmArmed = !alarmArmed;
  localStorage.setItem('alarmArmed', alarmArmed ? '1' : '0');
  updateAlarmBtn();
  if (alarmArmed) {
    tone([[0, 880]], 0.15, 0.3);   // user gesture unlocks audio for later
    try {
      if ('Notification' in window && Notification.permission === 'default')
        await Notification.requestPermission();
    } catch (e) {}
  }
};
updateAlarmBtn();

async function loadForecast() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&elevation=${ELEV}` +
    `&hourly=temperature_2m,cloud_cover_low,cloud_cover_mid,cloud_cover_high,precipitation,precipitation_probability,cape,wind_speed_10m,wind_direction_10m,wind_gusts_10m` +
    `&minutely_15=precipitation` +
    `&forecast_days=2&timezone=Europe%2FRome&wind_speed_unit=kmh`;
  try {
    const d = await (await fetch(url)).json();
    state.lastForecast = d;
    renderHours(d);
    updateAdvice();
  } catch (e) {
    $('adviceText').textContent = 'Wetterdaten nicht erreichbar';
  }
}

function renderHours(d) {
  const h = d.hourly;
  const now = new Date();
  const startIdx = h.time.findIndex(t => new Date(t) >= new Date(now.getTime() - 3600e3));
  const wrap = $('hours');
  wrap.innerHTML = '';
  for (let i = startIdx; i < Math.min(startIdx + 14, h.time.length); i++) {
    const time = new Date(h.time[i]);
    const low = h.cloud_cover_low[i], mid = h.cloud_cover_mid[i], high = h.cloud_cover_high[i];
    const precip = h.precipitation[i], prob = h.precipitation_probability[i], cape = h.cape[i];
    const el = document.createElement('div');
    el.className = 'hour' + (i === startIdx ? ' now' : '');
    el.innerHTML = `
      <div class="t">${i === startIdx ? 'jetzt' : time.toLocaleTimeString('de-IT', { hour: '2-digit', minute: '2-digit' })}</div>
      <div class="icon">${skyIcon(low, mid, high, precip, cape)}</div>
      <div class="temp">${Math.round(h.temperature_2m[i])}°</div>
      <div class="clouds" title="tief ${low}% · mittel ${mid}% · hoch ${high}%">
        <div class="lo" style="--h:${low}%"></div>
        <div class="mi" style="--h:${mid}%"></div>
        <div class="hi" style="--h:${high}%"></div>
      </div>
      <div class="rain">${precip > 0 ? `<b>${precip.toFixed(1)} mm</b> · ` : ''}${prob != null ? prob + '%' : ''}</div>
      ${cape >= 800 ? `<div class="cape">⚡ CAPE ${Math.round(cape)}</div>` : ''}
      <div class="wind">${windArrow(h.wind_direction_10m[i])} ${Math.round(h.wind_speed_10m[i])} km/h</div>`;
    wrap.appendChild(el);
  }
}

const DIR8 = ['N', 'NO', 'O', 'SO', 'S', 'SW', 'W', 'NW'];
const dirTxt = b => DIR8[Math.round(b / 45) % 8];

let advBusy = false;
async function updateAdvice() {
  const d = state.lastForecast;
  if (!d || advBusy) return;
  advBusy = true;
  const adv = $('advice'), txt = $('adviceText'), det = $('adviceDetail');
  const now = Date.now();

  // 1) live radar: nearest cell, approach speed, ETA
  let storm = null;
  try { storm = await analyzeStorm(); } catch (e) {}

  // 2) next precipitation at the hut within 2 h (15-min model)
  let rainInMin = null;
  const m = d.minutely_15;
  if (m) {
    for (let i = 0; i < m.time.length; i++) {
      const t = new Date(m.time[i]).getTime();
      if (t < now - 15 * 60e3 || t > now + 120 * 60e3) continue;
      if (m.precipitation[i] >= 0.1) { rainInMin = Math.max(0, Math.round((t - now) / 60e3)); break; }
    }
  }

  // 3) thunderstorm potential next 6 h
  const h = d.hourly;
  let maxCape = 0, capeAt = null;
  for (let i = 0; i < h.time.length; i++) {
    const t = new Date(h.time[i]).getTime();
    if (t < now - 3600e3 || t > now + 6 * 3600e3) continue;
    if (h.cape[i] > maxCape) { maxCape = h.cape[i]; capeAt = h.time[i]; }
  }

  let level = 'ok', main = '', detail = '', acute = false;
  const s = storm && !storm.none ? storm : null;
  // real thunderstorm evidence: heavy convective radar core, or storm-grade CAPE.
  // Without it, rain is a yellow notice — the siren must not cry wolf on drizzle.
  const thundery = (s && s.strongNow) || maxCape >= 800;
  const icon = s && s.strongNow ? '⛈' : '🌧';

  if (s && s.dist <= 5 && thundery) {
    level = 'danger'; acute = true;
    main = `⛈ Gewitterzelle nur ${Math.max(1, Math.round(s.dist))} km entfernt (${dirTxt(s.bearing)}) – absteigen!`;
    detail = 'Blitzschlaggefahr am Grat. Sofort tiefer gehen, Kuppen und freistehende Bäume meiden.';
  } else if (s && s.eta !== null && s.eta <= 45 && thundery) {
    level = 'danger'; acute = true;
    main = `⛈ Gewitter im Anzug aus ${dirTxt(s.bearing)}: Zelle in ${Math.round(s.dist)} km, bei dir in ca. ${Math.max(5, Math.round(s.eta / 5) * 5)} min`;
    detail = 'Jetzt aufbrechen: Sarner Skihütte ≈ 45 min, Putzen ≈ 1½ h Abstieg.';
  } else if (rainInMin !== null && rainInMin <= 30 && thundery) {
    level = 'danger'; acute = true;
    main = rainInMin === 0 ? '⛈ Gewitterregen setzt ein – absteigen!' : `⛈ Gewitterlage: Niederschlag in ca. ${rainInMin} min`;
    detail = `CAPE bis ${Math.round(maxCape)} J/kg – Radar unten prüfen, Zugrichtung der Zellen beachten.`;
  } else if (s && s.dist <= 5) {
    level = 'warn';
    main = `🌧 Regen unmittelbar: Echo ${Math.max(1, Math.round(s.dist))} km entfernt (${dirTxt(s.bearing)})`;
    detail = 'Kein Gewitterpotenzial erkennbar – nass, aber kein Grund zur Eile.';
  } else if (rainInMin !== null && rainInMin <= 30) {
    level = 'warn';
    main = rainInMin === 0 ? '🌧 Leichter Niederschlag' : `🌧 Niederschlag in ca. ${rainInMin} min`;
    detail = 'Kein Gewitterpotenzial – Regenschutz genügt.';
  } else if (s && s.dist <= 25) {
    level = 'warn';
    main = `${icon} Zelle in ${Math.round(s.dist)} km (${dirTxt(s.bearing)})${s.eta ? `, nähert sich – ca. ${Math.round(s.eta / 5) * 5} min` : ', zieht derzeit nicht direkt heran'}`;
    detail = 'Radar-Loop beobachten und Abstieg vorbereiten.';
  } else if (rainInMin !== null) {
    level = 'warn';
    main = `🌦 Niederschlag in ca. ${Math.round(rainInMin / 15) * 15} min erwartet`;
    detail = 'Rechtzeitig Abstieg planen (Sarner Skihütte ≈ 45 min, Putzen ≈ 1½ h).';
  } else if (maxCape >= 1500) {
    level = 'danger';
    main = '⚡ Hohe Gewitterneigung heute';
    detail = `CAPE bis ${Math.round(maxCape)} J/kg um ${new Date(capeAt).toLocaleTimeString('de-IT', { hour: '2-digit', minute: '2-digit' })} – exponierten Grat meiden.`;
  } else if (maxCape >= 800) {
    level = 'warn';
    main = '⚡ Gewitter möglich';
    detail = `CAPE bis ${Math.round(maxCape)} J/kg – Radar im Blick behalten.`;
  } else {
    level = 'ok';
    main = s === null || (storm && storm.none)
      ? `✅ Kein Niederschlagsecho im Umkreis von ${SCAN_KM} km`
      : '✅ Kein Niederschlag in den nächsten 2 h erwartet';
    detail = maxCape > 0 ? `Gewitterpotenzial gering (CAPE max. ${Math.round(maxCape)} J/kg in 6 h).` : '';
  }

  adv.className = level;
  txt.textContent = main;
  det.textContent = detail;

  // siren only on acute thunderstorm conditions (never plain rain or CAPE outlook)
  if (alarmArmed && acute) fireAlarm(main);
  advBusy = false;
}
loadForecast();
setInterval(loadForecast, 10 * 60 * 1000);
setInterval(updateAdvice, 5 * 60 * 1000);
</script>
